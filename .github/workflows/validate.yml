name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: browser-actions/setup-chrome@v1

      - run: npm ci
      - run: npm run validate:catalog
      - run: npm run generate
      - run: npm test
      - run: npm run build
